name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Build with Maven
      run: mvn -B -DskipTests clean package

    - name: Run tests
      run: mvn test

    - name: Publish test results
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Maven Tests
        path: target/surefire-reports/*.xml
        reporter: java-junit
        fail-on-error: false

    - name: SpotBugs analysis (best-effort)
      run: mvn com.github.spotbugs:spotbugs-maven-plugin:4.7.4:check
      continue-on-error: true

    - name: Checkstyle analysis (best-effort)
      run: mvn org.apache.maven.plugins:maven-checkstyle-plugin:3.2.2:check
      continue-on-error: true

    - name: Upload build artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: annasuraksha-jar
        path: target/*.jar
