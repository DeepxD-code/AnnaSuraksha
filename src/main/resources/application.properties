server.port=8081

# ── Database (H2 in-memory for demo) ──────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:annasuraksha;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# ── JPA tuning ─────────────────────────────────────────────────────────────
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.show-sql=false

# ── Groq AI ────────────────────────────────────────────────────────────────
groq.api.key=${GROQ_API_KEY:YOUR_GROQ_KEY_HERE}
groq.model=llama-3.3-70b-versatile

# ── JWT ────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:ANNASURAKSHA_V5_JWT_SECRET_KEY_32CHARS_MIN}
jwt.expiry-minutes=480

# ── Demo data ──────────────────────────────────────────────────────────────
annasuraksha.seed.demo-data=false
annasuraksha.simulation.enabled=true

# ── Async thread pool ──────────────────────────────────────────────────────
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=500
spring.task.execution.thread-name-prefix=anna-async-

# ── Actuator ───────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.service=annasuraksha
management.metrics.tags.version=5.0.0

# ── Jackson ────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=NON_NULL

# ── Thymeleaf ──────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ── Multipart ──────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ── Logging ────────────────────────────────────────────────────────────────
logging.level.com.annasuraksha=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
